<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Guru Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-content">
                <h1><i class="fas fa-tshirt"></i> Fashion Guru</h1>
                <p>Your personal fashion assistant</p>
            </div>
            <div class="location-selector">
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" id="location-input" placeholder="Enter your city" value="New York">
            </div>
        </header>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                <div class="message-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-content">
                    <p>Hello! I'm your Fashion Guru! 👗 I'm here to help you look amazing every day!</p>
                    <div class="suggestions">
                        <button class="suggestion-btn" onclick="sendSuggestion('What should I wear today?')">What should I wear today?</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('Help me choose an outfit for work')">Help me choose an outfit for work</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('What should I buy for my wardrobe?')">What should I buy for my wardrobe?</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typing-indicator" style="display: none;">
            <div class="message bot-message">
                <div class="message-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-content">
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </div>
        
        <form class="chat-input-form" id="chat-form">
            <div class="input-container">
                <input 
                    type="text" 
                    id="message-input" 
                    placeholder="Ask me about fashion advice, outfits, or shopping..." 
                    autocomplete="off"
                    maxlength="500"
                >
                <button type="submit" id="send-button">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </div>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
